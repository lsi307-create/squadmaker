<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VISAN FC MANAGER</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --neon-green: #00ffcc;
            --neon-blue: #3b82f6;
            --neon-red: #ff4757;
            --text-main: #f8fafc;
            --pitch-line: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617; color: var(--text-main); overflow: hidden; }

        /* 배경 효과 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .main-view { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; width: 100%; height: 100%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); opacity: 0; display: flex; flex-direction: column; }
        .page.active { transform: translateX(0); opacity: 1; }
        .page.prev { transform: translateX(-100%); }

        /* 대시보드 */
        .dashboard { padding: 20px 15px; overflow-y: auto; padding-bottom: 120px; }
        
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px;
            padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px;
        }

        textarea {
            width: 100%; height: 80px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: var(--neon-green); padding: 12px; font-size: 13px; outline: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .game-btn {
            border: none; border-radius: 10px; padding: 12px; font-weight: 900;
            font-size: 12px; color: white; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-orange { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
        .game-btn:active { transform: scale(0.95); filter: brightness(1.2); }

        /* 팀 섹션 */
        .team-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .team-box { 
            position: relative; border-radius: 20px; padding: 10px; 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        }
        .team-box.a-side { border-top: 4px solid var(--neon-red); }
        .team-box.b-side { border-top: 4px solid var(--neon-blue); }
        
        .team-title {
            font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 12px;
            padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.3);
        }

        .player-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; margin-bottom: 8px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
            font-size: 13px; transition: 0.2s;
        }
        .player-bar.selected {
            background: rgba(0, 255, 204, 0.15); border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .grade-badge {
            font-size: 10px; font-weight: 900; width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; background: #334155;
        }

        /* 하단 탭 (높이 95px 유지) */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; height: 95px;
            background: #0f172a; display: grid; grid-template-columns: repeat(3, 1fr);
            border-top: 2px solid #334155; z-index: 4000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 5px; color: #64748b; transition: 0.3s;
        }
        .nav-btn.active { color: var(--neon-green); }
        .nav-btn span:first-child { font-size: 26px; }
        .nav-btn span:last-child { font-size: 12px; font-weight: 800; }

        /* 전술판 */
        .pitch-area {
            flex: 1; margin: 10px; border-radius: 20px; position: relative;
            background: #1a471a; border: 3px solid var(--pitch-line);
            background-image: repeating-linear-gradient(0deg, #1a471a, #1a471a 50px, #1d4d1d 50px, #1d4d1d 100px);
        }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 2px solid var(--pitch-line); border-radius: 50%; }
        .half-line { position: absolute; top: 50%; width: 100%; height: 2px; background: var(--pitch-line); }

        /* 사이드 패널 (기록 관리) - 스크롤 보완됨 */
        .side-panel {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: #0f172a; z-index: 5000; transition: 0.4s; padding: 30px 20px;
            overflow-y: auto; /* 세로 스크롤 허용 추가 */
            -webkit-overflow-scrolling: touch; /* 모바일 부드러운 스크롤 */
        }
        #sideList { padding-bottom: 80px; } /* 하단 내용 여백 추가 */
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-view">
        <section id="p-0" class="page active dashboard">
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <span style="font-weight:900; font-size:14px; color:var(--neon-green);">매니저 콘솔</span>
                    <span id="curQtrDisp" style="font-size:12px; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:20px;">제 1쿼터</span>
                </div>
                <textarea id="nameIn" placeholder="참석자 명단을 입력하거나 붙여넣으세요..."></textarea>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:15px;">
                    <button class="game-btn btn-blue" onclick="createSquad()">명단생성</button>
                    <button class="game-btn btn-green" onclick="autoAssign()">자동배정</button>
                    <button class="game-btn btn-orange" onclick="finishQtr()">쿼터종료</button>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding:0 5px;">
                <h2 style="margin:0; font-size:18px; font-weight:900;">팀 밸런스 조정</h2>
                <button onclick="toggleSide()" style="background:none; border:1px solid #475569; color:#94a3b8; padding:5px 12px; border-radius:8px; font-size:11px; font-weight:700;">기록 관리 ⚙️</button>
            </div>

            <div class="team-container">
                <div class="team-box a-side" onclick="navTo(1)">
                    <div class="team-title" style="color:var(--neon-red)">TEAM A (레드)</div>
                    <div id="l-teamA" onclick="event.stopPropagation()"></div>
                </div>
                <div class="team-box b-side" onclick="navTo(2)">
                    <div class="team-title" style="color:var(--neon-blue)">TEAM B (블루)</div>
                    <div id="l-teamB" onclick="event.stopPropagation()"></div>
                </div>
            </div>

            <div style="margin-top:25px; font-size:12px; font-weight:800; color:#64748b; padding-left:5px; margin-bottom:10px;">교체 대기 명단</div>
            <div id="l-mainSub" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:120px;"></div>
        </section>

        <section id="p-1" class="page" style="--team-color:var(--neon-red)">
            <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; color:var(--neon-red); font-size:22px; font-weight:900;">A팀 전술판</h2>
                <button class="game-btn btn-blue" style="padding:8px 15px;" onclick="navTo(0)">밸런싱 복귀</button>
            </div>
            <div class="pitch-area">
                <div class="half-line"></div>
                <div class="center-circle"></div>
                <div id="pitch-teamA"></div>
            </div>
            <div style="font-size:12px; font-weight:bold; padding:12px 20px; color:#94a3b8; background:rgba(0,0,0,0.3);">🔄 교체 가능 선수</div>
            <div id="sub-teamA" style="flex:0.35; background:rgba(0,0,0,0.3); display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:15px; overflow-y:auto; padding-bottom:110px;"></div>
        </section>

        <section id="p-2" class="page" style="--team-color:var(--neon-blue)">
            <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; color:var(--neon-blue); font-size:22px; font-weight:900;">B팀 전술판</h2>
                <button class="game-btn btn-blue" style="padding:8px 15px;" onclick="navTo(0)">밸런싱 복귀</button>
            </div>
            <div class="pitch-area">
                <div class="half-line"></div>
                <div class="center-circle"></div>
                <div id="pitch-teamB"></div>
            </div>
            <div style="font-size:12px; font-weight:bold; padding:12px 20px; color:#94a3b8; background:rgba(0,0,0,0.3);">🔄 교체 가능 선수</div>
            <div id="sub-teamB" style="flex:0.35; background:rgba(0,0,0,0.3); display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:15px; overflow-y:auto; padding-bottom:110px;"></div>
        </section>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="navTo(0)"><span>📊</span><span>팀 밸런싱</span></div>
        <div class="nav-btn" onclick="navTo(1)"><span>🛡️</span><span>A팀 전술</span></div>
        <div class="nav-btn" onclick="navTo(2)"><span>⚔️</span><span>B팀 전술</span></div>
    </nav>

    <div id="sidePanel" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="margin:0; color:var(--neon-green);">선수 상세 기록</h2>
            <button onclick="toggleSide()" style="background:rgba(255,255,255,0.1); border:none; color:white; width:40px; height:40px; border-radius:50%;">✕</button>
        </div>
        <div id="sideList"></div>
    </div>
</div>

<script>
    let players = [];
    let curQtr = 1;
    let selIdx = null;

    const formPos = [
        {p:[88, 50], t: 'GK'}, {p:[72, 15], t: 'LB'}, {p:[75, 38], t: 'CB'}, {p:[75, 62], t: 'CB'}, {p:[72, 85], t: 'RB'},
        {p:[42, 20], t: 'LM'}, {p:[45, 50], t: 'CM'}, {p:[42, 80], t: 'RM'}, {p:[18, 20], t: 'LW'}, {p:[12, 50], t: 'ST'}, {p:[18, 80], t: 'RW'}
    ];

    function navTo(idx) {
        document.querySelectorAll('.page').forEach((p, i) => {
            p.classList.toggle('active', i === idx);
            p.classList.toggle('prev', i < idx);
        });
        document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    }

    function toggleSide() { 
        const sp = document.getElementById('sidePanel');
        sp.style.right = (sp.style.right === '0px') ? '-100%' : '0px';
    }

    function createSquad() {
        const txt = document.getElementById('nameIn').value;
        if(!txt.trim()) return;
        const names = [...new Set(txt.replace(/\[.*?\]/g, ' ').split(/,|\n|\s+/).map(n => n.trim()).filter(n => n.length >= 2))];
        players = names.map((n, i) => {
            const ex = players.find(p => p.name === n);
            return ex ? ex : { name: n, grade: 'B', played: 0, goals: 0, assists: 0, order: i };
        });
        render();
    }

    function render() {
        const lA = document.getElementById('l-teamA'); const lB = document.getElementById('l-teamB');
        const pA = document.getElementById('pitch-teamA'); const pB = document.getElementById('pitch-teamB');
        const sA = document.getElementById('sub-teamA'); const sB = document.getElementById('sub-teamB');
        const lMainSub = document.getElementById('l-mainSub');
        const sList = document.getElementById('sideList');

        lA.innerHTML = ''; lB.innerHTML = ''; pA.innerHTML = ''; pB.innerHTML = ''; sA.innerHTML = ''; sB.innerHTML = ''; lMainSub.innerHTML = ''; sList.innerHTML = '';

        players.forEach((p, i) => {
            const isS = selIdx === i;
            const bar = document.createElement('div');
            bar.className = `player-bar ${isS ? 'selected' : ''}`;
            bar.innerHTML = `<span>${p.name}</span><div class="grade-badge" style="color:${p.grade==='S'?'#fbbf24':'#fff'}">${p.grade}</div>`;
            bar.onclick = (e) => { e.stopPropagation(); handleSel(i); };

            if (i < 11) lA.appendChild(bar);
            else if (i < 22) lB.appendChild(bar);
            else lMainSub.appendChild(bar);

            if (i < 11) renderIcon(pA, p, i, formPos[i], isS, 'var(--neon-red)');
            else if (i < 22) renderIcon(pB, p, i, formPos[i-11], isS, 'var(--neon-blue)');
            
            if (i >= 11) {
                const sub = document.createElement('div');
                sub.style.cssText = `background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center; border:1px solid ${isS?'var(--neon-green)':'transparent'}`;
                sub.innerHTML = `<b style="font-size:13px;">${p.name}</b><br><span style="font-size:10px; color:#64748b;">${p.grade} / ${p.played}쿼터</span>`;
                sub.onclick = () => handleSel(i);
                sA.appendChild(sub.cloneNode(true));
                sB.appendChild(sub);
                sA.lastChild.onclick = () => handleSel(i);
            }

            const sideItem = document.createElement('div');
            sideItem.style.cssText = "background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.05);";
            sideItem.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <b style="font-size:16px;">${p.name}</b>
                    <div style="display:flex; gap:5px;">
                        ${['S','A','B'].map(g => `<button onclick="setGrade(${i},'${g}')" style="background:${p.grade===g?'var(--neon-green)':'#1e293b'}; border:none; color:${p.grade===g?'#000':'#fff'}; padding:5px 10px; border-radius:6px; font-size:10px; font-weight:900;">${g}</button>`).join('')}
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button onclick="addStat(${i},'goals')" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; padding:10px; border-radius:10px; font-size:12px;">⚽ 득점: ${p.goals}</button>
                    <button onclick="addStat(${i},'assists')" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; padding:10px; border-radius:10px; font-size:12px;">👟 도움: ${p.assists}</button>
                </div>
            `;
            sList.appendChild(sideItem);
        });
    }

    function renderIcon(target, p, i, pos, sel, color) {
        const div = document.createElement('div');
        div.style.cssText = `position:absolute; top:${pos.p[0]}%; left:${pos.p[1]}%; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; z-index:100;`;
        div.innerHTML = `
            <div style="width:40px; height:40px; border-radius:50%; border:2px solid #fff; background:radial-gradient(circle at 30% 30%, ${color}, #000); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; ${sel?'box-shadow:0 0 20px var(--neon-green); border-color:var(--neon-green)!important;':''}">
                ${pos.t}
            </div>
            <div style="margin-top:5px; font-size:11px; font-weight:800; background:rgba(0,0,0,0.7); padding:2px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.2);">${p.name}</div>
        `;
        div.onclick = () => handleSel(i);
        target.appendChild(div);
    }

    function handleSel(i) {
        if (selIdx === null) selIdx = i;
        else if (selIdx === i) selIdx = null;
        else {
            const temp = players[selIdx];
            players[selIdx] = players[i];
            players[i] = temp;
            selIdx = null;
        }
        render();
    }

    function setGrade(i, g) { players[i].grade = g; render(); }
    function addStat(i, k) { players[i][k]++; render(); }
    function autoAssign() { players.sort((a, b) => (a.played - b.played) || (a.order - b.order)); render(); }
    function finishQtr() { 
        if(!confirm("제 " + curQtr + "쿼터를 종료하시겠습니까? (선수별 쿼터수 +1)")) return; 
        for(let i=0; i<Math.min(players.length, 22); i++) players[i].played++; 
        curQtr++; document.getElementById('curQtrDisp').innerText = "제 " + curQtr + "쿼터"; render(); 
    }
</script>
</body>
</html>
